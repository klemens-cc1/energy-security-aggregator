  <style>
    :root {
      --red:        #BA0C2F;
      --charcoal:   #252525;
      --mid:        #3a3a3a;
      --gray:       #909090;
      --light:      #efefef;
      --white:      #ffffff;
      --border:     #e0e0e0;
      --state-fill: #aeaaa4;
      --state-hover:#9b9690;
      --state-sel:  #f5e8ea;
      --inactive:   #f0eeed;

      --font-head: 'Oswald', sans-serif;
      --font-body: 'Merriweather Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--light);
      color: var(--charcoal);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: var(--charcoal);
      padding: 0 28px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-top: 3px solid var(--red);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    header .wordmark {
      font-family: var(--font-head);
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      line-height: 1;
    }

    header .divider {
      width: 1px;
      height: 22px;
      background: #3a3a3a;
      flex-shrink: 0;
    }

    header .subtitle {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 300;
      color: #ccc;
      letter-spacing: 0.01em;
    }

    header .institution {
      font-family: var(--font-head);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #555;
      margin-top: 3px;
    }

    header .instruction {
      margin-left: auto;
      font-family: var(--font-head);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    /* ── Main layout ── */
    #app {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    #map-wrapper {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      background: var(--white);
    }

    #map {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 88px);
    }

    /* ── Side panel ── */
    #panel {
      width: 0;
      overflow: hidden;
      background: var(--white);
      border-left: 1px solid var(--border);
      transition: width 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #panel::before {
      content: '';
      display: block;
      height: 3px;
      background: var(--red);
      flex-shrink: 0;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
    }

    #panel.open { width: 340px; }

    #panel-inner {
      width: 340px;
      padding: 24px 22px 20px;
      overflow-y: auto;
      flex: 1;
      margin-top: 4px;
      transform: translateX(16px);
      opacity: 0;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1) 0.05s,
                  opacity 0.22s ease 0.08s;
    }

    #panel.open #panel-inner {
      transform: translateX(0);
      opacity: 1;
    }

    #panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 4px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    #panel-state-name {
      font-family: var(--font-head);
      font-weight: 500;
      font-size: 1.35rem;
      line-height: 1.15;
      color: var(--charcoal);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #panel-abbr {
      font-family: var(--font-head);
      font-size: 0.68rem;
      color: var(--red);
      letter-spacing: 0.14em;
      font-weight: 400;
      text-transform: uppercase;
      margin-top: 3px;
    }

    #panel-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--gray);
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-left: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      font-family: var(--font-body);
    }
    #panel-close:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Politics strip ── */
    #panel-politics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .pol-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .pol-role {
      font-family: var(--font-head);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .pol-badge {
      font-family: var(--font-head);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      line-height: 1.6;
    }
    .pol-badge.R { background: #f5e8ea; color: var(--red); }
    .pol-badge.D { background: #e8eef5; color: #2a5a8c; }

    .market-badge {
      font-family: var(--font-head);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      line-height: 1.6;
    }
    .market-badge.Regulated   { background: #e8f0e8; color: #2a6b2a; }
    .market-badge.Deregulated { background: #e8eef5; color: #2a5a8c; }
    .market-badge.Partial     { background: #f5f0e0; color: #7a5a00; }

    .pol-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      margin: 0 2px;
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .field-row:last-child { border-bottom: none; }

    .field-label {
      font-family: var(--font-head);
      font-size: 0.65rem;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .field-label-link:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .field-value {
      font-size: 0.82rem;
      font-weight: 400;
      line-height: 1.55;
      color: var(--charcoal);
    }
    .field-value.empty {
      color: #ccc;
      font-style: italic;
      font-size: 0.8rem;
    }

    /* ── Map state paths ── */
    .state {
      fill: var(--state-fill);
      stroke: var(--white);
      stroke-width: 0.8;
      cursor: pointer;
      transition: fill 0.14s ease;
    }
    .state:hover {
      fill: var(--state-hover);
    }
    .state.selected {
      fill: var(--state-sel);
      stroke: var(--red);
      stroke-width: 1.8;
    }
    .state.inactive {
      fill: var(--inactive);
      stroke: var(--white);
      cursor: default;
      pointer-events: none;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: var(--charcoal);
      color: var(--light);
      padding: 6px 10px;
      font-family: var(--font-head);
      font-size: 0.76rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      visibility: hidden;
      white-space: nowrap;
      border-left: 2px solid var(--red);
    }

    /* ── Footer / legend ── */
    #legend {
      flex-shrink: 0;
      padding: 6px 24px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray);
      border-top: 1px solid var(--border);
      background: var(--white);
    }

    #legend-label {
      font-style: italic;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="wordmark">CITS</div>
    <div class="institution">Center for International Trade &amp; Security</div>
  </div>
  <div class="divider"></div>
  <div class="subtitle">Energy Security Map</div>
  <div class="instruction">Click a state to expand</div>
</header>

<div id="app">
  <div id="map-wrapper">
    <svg id="map" viewBox="0 0 960 600" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <div id="panel">
    <div id="panel-inner">
      <div id="panel-header">
        <div>
          <div id="panel-state-name"></div>
          <div id="panel-abbr"></div>
        </div>
        <button id="panel-close" aria-label="Close panel">&#x2715;</button>
      </div>
      <div id="panel-politics"></div>
      <div id="panel-fields"></div>
    </div>
  </div>
</div>

<div id="legend">
  </div>

<div id="tooltip"></div>

<script>
// States to highlight — all others are grayed out and non-interactive
const activeStates = new Set([
  // Southeast
  "AL","AR","FL","GA","KY","LA","MS","NC","SC","TN",
  // Northeast / Mid-Atlantic
  "DE","NH","NJ","NY",
  // West
  "AZ","CA","CO","NM","NV",
  // Midwest
  "IN","NE",
]);

const fipsToAbbr = {
  "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT",
  "10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL",
  "18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD",
  "25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE",
  "32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND",
  "39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD",
  "47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV",
  "55":"WI","56":"WY"
};

function buildColorScale() {
  const values = Object.values(stateData)
    .map(d => d.colorValue)
    .filter(v => v !== null && v !== undefined);

  if (values.length === 0) return null;

  return d3.scaleSequential()
    .domain([d3.min(values), d3.max(values)])
    .interpolator(d3.interpolateRgb("#d0cdc8", "#252525"));
}

function stateColor(abbr, scale) {
  if (!scale) return null; // use CSS default (--teal via class)
  const d = stateData[abbr];
  if (!d || d.colorValue === null || d.colorValue === undefined) return null;
  return scale(d.colorValue);
}

const svg         = d3.select("#map");
const panel       = document.getElementById("panel");
const panelName   = document.getElementById("panel-state-name");
const panelAbbr   = document.getElementById("panel-abbr");
const panelFields = document.getElementById("panel-fields");
const tooltip     = document.getElementById("tooltip");

let selectedAbbr  = null;
let selectedEl    = null;
let georgiaFeature = null;

const projection = d3.geoAlbersUsa().scale(1300).translate([487.5, 305]);
const path = d3.geoPath().projection(projection);

// Single group so zoom transform applies to states + mesh together
const g = svg.append("g");

d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
  const states = topojson.feature(us, us.objects.states);
  const colorScale = buildColorScale();

  // Cache Georgia's feature for bounds calculation
  georgiaFeature = states.features.find(f => fipsToAbbr[f.id] === "GA");

  g.selectAll(".state")
    .data(states.features)
    .join("path")
      .attr("class", d => {
        const abbr = fipsToAbbr[d.id];
        return activeStates.has(abbr) ? "state" : "state inactive";
      })
      .attr("d", path)
      .each(function(d) {
        const abbr = fipsToAbbr[d.id];
        if (!activeStates.has(abbr)) return;
        const c = stateColor(abbr, colorScale);
        if (c) d3.select(this).style("fill", c);
      })
      .on("mouseover", onHover)
      .on("mousemove", onMove)
      .on("mouseout",  onOut)
      .on("click",     onClick);

  g.append("path")
    .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
    .attr("fill", "none")
    .attr("stroke", "#ffffff")
    .attr("stroke-width", 0.7)
    .attr("d", path)
    .attr("pointer-events", "none");

  if (colorScale) updateLegend(colorScale);
});

function zoomToGeorgia() {
  if (!georgiaFeature) return;
  const [[x0, y0], [x1, y1]] = path.bounds(georgiaFeature);
  const scale = Math.min(960 / (x1 - x0), 600 / (y1 - y0)) * 0.78;
  const tx = 480 - scale * (x0 + x1) / 2;
  const ty = 300 - scale * (y0 + y1) / 2;
  g.transition()
    .duration(700)
    .ease(d3.easeCubicInOut)
    .attr("transform", `translate(${tx},${ty}) scale(${scale})`);
}

function resetZoom() {
  g.transition()
    .duration(500)
    .ease(d3.easeCubicInOut)
    .attr("transform", "translate(0,0) scale(1)");
}

function onHover(event, d) {
  const abbr = fipsToAbbr[d.id];
  const state = stateData[abbr];
  tooltip.textContent = state ? state.name : abbr;
  tooltip.style.visibility = "visible";
}

function onMove(event) {
  tooltip.style.top  = (event.clientY - 38) + "px";
  tooltip.style.left = (event.clientX + 14) + "px";
}

function onOut() {
  tooltip.style.visibility = "hidden";
}

function openPanel(abbr, el) {
  const state = stateData[abbr];
  if (!state) return;

  if (selectedAbbr === "GA" && abbr !== "GA") resetZoom();

  selectedAbbr = abbr;
  selectedEl   = el;
  d3.selectAll(".state").classed("selected", d => fipsToAbbr[d.id] === abbr);
  if (el) d3.select(el).raise();

  if (abbr === "GA") zoomToGeorgia();

  panelName.textContent = state.name;
  panelAbbr.textContent = abbr;

  // Politics strip
  const polEl = document.getElementById("panel-politics");
  while (polEl.firstChild) polEl.removeChild(polEl.firstChild);

  if (state.politics) {
    const addItem = (role, party) => {
      if (polEl.childElementCount > 0) {
        const div = document.createElement("div");
        div.className = "pol-divider";
        polEl.appendChild(div);
      }
      const item = document.createElement("div");
      item.className = "pol-item";

      const roleEl = document.createElement("span");
      roleEl.className = "pol-role";
      roleEl.textContent = role;

      const badge = document.createElement("span");
      badge.className = "pol-badge " + party;
      badge.textContent = party;

      item.appendChild(roleEl);
      item.appendChild(badge);
      polEl.appendChild(item);
    };

    addItem("Governor", state.politics.governor);
    for (const [chamber, party] of Object.entries(state.politics.chambers)) {
      addItem(chamber, party);
    }

    if (state.politics.market) {
      const div = document.createElement("div");
      div.className = "pol-divider";
      polEl.appendChild(div);

      const item = document.createElement("div");
      item.className = "pol-item";

      const roleEl = document.createElement("span");
      roleEl.className = "pol-role";
      roleEl.textContent = "Utility";

      const badge = document.createElement("span");
      badge.className = "market-badge " + state.politics.market;
      badge.textContent = state.politics.market;

      item.appendChild(roleEl);
      item.appendChild(badge);
      polEl.appendChild(item);
    }
  }

  while (panelFields.firstChild) panelFields.removeChild(panelFields.firstChild);

  for (const [label, value] of Object.entries(state.fields)) {
    const row = document.createElement("div");
    row.className = "field-row";

    const lbl = document.createElement("span");
    lbl.className = "field-label";
    lbl.textContent = label;

    const val = document.createElement("span");
    val.className = "field-value";
    if (value === null || value === undefined) {
      val.classList.add("empty");
      val.textContent = "no data";
    } else if (typeof value === "object" && value.url) {
      val.textContent = value.text;
      lbl.style.cursor = "pointer";
      lbl.title = "Open full bill";
      lbl.addEventListener("click", () => window.open(value.url, "_blank", "noopener"));
      lbl.classList.add("field-label-link");
    } else {
      val.textContent = value;
    }

    row.appendChild(lbl);
    row.appendChild(val);
    panelFields.appendChild(row);
  }

  panel.classList.add("open");
}

function closePanel() {
  if (selectedAbbr === "GA") resetZoom();
  selectedAbbr = null;
  selectedEl   = null;
  panel.classList.remove("open");
  d3.selectAll(".state").classed("selected", false);
}

function onClick(event, d) {
  const abbr = fipsToAbbr[d.id];
  if (selectedAbbr === abbr) {
    closePanel();
  } else {
    openPanel(abbr, event.currentTarget);
  }
}

document.getElementById("panel-close").addEventListener("click", closePanel);

function updateLegend(scale) {
  const [lo, hi] = scale.domain();
  const legendEl = document.getElementById("legend");
  while (legendEl.firstChild) legendEl.removeChild(legendEl.firstChild);

  const loSpan = document.createElement("span");
  loSpan.textContent = lo.toLocaleString();

  const bar = document.createElement("canvas");
  bar.width = 140;
  bar.height = 6;
  bar.style.cssText = "width:140px;height:6px;";
  const ctx = bar.getContext("2d");
  for (let i = 0; i < 140; i++) {
    ctx.fillStyle = scale(lo + (hi - lo) * (i / 139));
    ctx.fillRect(i, 0, 1, 6);
  }

  const hiSpan = document.createElement("span");
  hiSpan.textContent = hi.toLocaleString();

  legendEl.appendChild(loSpan);
  legendEl.appendChild(bar);
  legendEl.appendChild(hiSpan);
}
</script>
</body>
</html>
